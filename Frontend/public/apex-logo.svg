<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="apexGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" /> <!-- Indigo-600 -->
      <stop offset="100%" style="stop-color:#C026D3;stop-opacity:1" /> <!-- Fuchsia-600 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <path d="M256 32 L448 448 H64 L256 32 Z" fill="#0f172a" stroke="url(#apexGradient)" stroke-width="24" stroke-linejoin="round" />
  
  <!-- Inner peak -->
  <path d="M256 120 L360 380 H152 L256 120 Z" fill="url(#apexGradient)" filter="url(#glow)" />
  
  <!-- Crossbar/Accent -->
  <path d="M190 280 H322" stroke="white" stroke-width="12" stroke-linecap="round" stroke-opacity="0.8" />
</svg>
